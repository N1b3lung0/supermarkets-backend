spring:
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: none
  # Use simple in-memory cache for tests — no Redis needed
  cache:
    type: simple

app:
  scraper:
    mercadona:
      base-url: https://tienda.mercadona.es/api
      request-timeout: 10s
  scheduler:
    sync:
      enabled: false

