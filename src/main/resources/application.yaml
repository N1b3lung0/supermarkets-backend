spring:
  application:
    name: supermarkets

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:supermarkets}
    username: ${DB_USERNAME:supermarkets}
    password: ${DB_PASSWORD:supermarkets}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized

app:
  scraper:
    mercadona:
      base-url: https://tienda.mercadona.es/api
      request-timeout: 10s
  scheduler:
    sync:
      enabled: true
