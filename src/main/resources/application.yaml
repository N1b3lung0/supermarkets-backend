spring:
  application:
    name: supermarkets

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:supermarkets}
    username: ${DB_USERNAME:supermarkets}
    password: ${DB_PASSWORD:supermarkets}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis
    redis:
      time-to-live: 3600000   # default 1 hour (ms)
      cache-null-values: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:9000/default}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized
  tracing:
    sampling:
      probability: 1.0   # 100% in dev; tune down in production

otel:
  exporter:
    otlp:
      endpoint: http://${OTEL_COLLECTOR_HOST:localhost}:${OTEL_COLLECTOR_PORT:4318}
  resource:
    attributes:
      service.name: ${spring.application.name}
      deployment.environment: ${SPRING_PROFILES_ACTIVE:local}

app:
  scraper:
    mercadona:
      base-url: https://tienda.mercadona.es/api
      request-timeout: 10s
    carrefour:
      base-url: https://www.carrefour.es
      request-timeout: 15s
    aldi:
      base-url: https://www.aldi.es
      request-timeout: 15s
    lidl:
      base-url: https://www.lidl.es
      request-timeout: 15s
    alcampo:
      base-url: https://www.alcampo.es
      request-timeout: 15s
    dia:
      base-url: https://www.dia.es
      request-timeout: 15s
  scheduler:
    sync:
      enabled: true
  cache:
    compare-ttl-seconds: 3600
    product-ttl-seconds: 1800
