services:

  postgres:
    image: postgres:17-alpine
    container_name: supermarkets-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-supermarkets}
      POSTGRES_USER: ${DB_USERNAME:-supermarkets}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supermarkets}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-supermarkets} -d ${DB_NAME:-supermarkets}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: supermarkets-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
