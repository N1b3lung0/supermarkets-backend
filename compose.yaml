services:

  postgres:
    image: postgres:17-alpine
    container_name: supermarkets-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-supermarkets}
      POSTGRES_USER: ${DB_USERNAME:-supermarkets}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supermarkets}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-supermarkets} -d ${DB_NAME:-supermarkets}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Local OAuth2 token server — issues valid JWTs for local development.
  # Spring Boot reads: spring.security.oauth2.resourceserver.jwt.issuer-uri
  #   → http://localhost:9000/default
  # Get a token:  curl -s -X POST http://localhost:9000/default/token \
  #                 -d 'grant_type=client_credentials' | jq -r .access_token
  # ---------------------------------------------------------------------------
  mock-oauth2-server:
    image: ghcr.io/navikt/mock-oauth2-server:2
    container_name: supermarkets-oauth2
    ports:
      - "9000:9000"
    environment:
      SERVER_PORT: 9000
      JSON_CONFIG: |
        {
          "interactiveLogin": true,
          "httpServer": "MockWebServerWrapper",
          "tokenCallbacks": [
            {
              "issuerId": "default",
              "requestMappings": [
                {
                  "requestParam": "grant_type",
                  "match": "client_credentials",
                  "claims": {
                    "sub": "local-dev",
                    "roles": ["admin"]
                  }
                }
              ]
            }
          ]
        }
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: supermarkets-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Observability stack
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: supermarkets-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - jaeger
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: supermarkets-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: supermarkets-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP receiver
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
