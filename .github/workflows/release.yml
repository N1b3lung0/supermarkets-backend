name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build, Push & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Gradle + Java 25
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      # -----------------------------------------------------------------------
      # Full quality gate — same checks as CI, must pass before publishing
      # -----------------------------------------------------------------------
      - name: Format check
        run: ./gradlew spotlessCheck

      - name: Style check
        run: ./gradlew checkstyleMain

      - name: Unit + architecture tests
        run: ./gradlew test --tests "*.domain.*" --tests "*.application.*" --tests "*ArchitectureTest"

      - name: Integration tests
        run: ./gradlew test --tests "*.infrastructure.*" --tests "*SupermarketsApplicationTests"
        env:
          TESTCONTAINERS_REUSE_ENABLE: "false"

      # -----------------------------------------------------------------------
      # Docker — build and push to GHCR
      # -----------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------------
      # GitHub Release with auto-generated notes from conventional commits
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

