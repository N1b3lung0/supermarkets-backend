name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Gradle + Java 25
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      # -----------------------------------------------------------------------
      # 1. Format check (Spotless)
      # -----------------------------------------------------------------------
      - name: Format check
        run: ./gradlew spotlessCheck

      # -----------------------------------------------------------------------
      # 2. Style check (Checkstyle)
      # -----------------------------------------------------------------------
      - name: Style check
        run: ./gradlew checkstyleMain

      # -----------------------------------------------------------------------
      # 3. Unit tests — domain + application (no Docker needed)
      # -----------------------------------------------------------------------
      - name: Unit tests
        run: ./gradlew test --tests "*.domain.*" --tests "*.application.*"

      # -----------------------------------------------------------------------
      # 4. Architecture boundary tests (ArchUnit)
      # -----------------------------------------------------------------------
      - name: Architecture tests
        run: ./gradlew test --tests "*ArchitectureTest"

      # -----------------------------------------------------------------------
      # 5. Integration tests — REST layer + JPA adapters (Testcontainers + Docker)
      # -----------------------------------------------------------------------
      - name: Integration tests
        run: ./gradlew test --tests "*.infrastructure.*" --tests "*SupermarketsApplicationTests" --tests "*PerformanceSmokeTest"
        env:
          TESTCONTAINERS_REUSE_ENABLE: "false"

      # -----------------------------------------------------------------------
      # Upload reports on failure
      # -----------------------------------------------------------------------
      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/
          retention-days: 7

